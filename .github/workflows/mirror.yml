name: Mirror to GitHub B

on:
  push:
    branches:
      - '**'        # triggers on pushes to ALL branches
  delete:           # also syncs branch deletions

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # important: gets ALL branches and tags

      - name: Push mirror to GitHub B
        run: |
          git remote add mirror https://360enter:${{ secrets.MIRROR_TOKEN }}@github.com/360enter/studio-bid-project.git
          git push mirror --mirror
